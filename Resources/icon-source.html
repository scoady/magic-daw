<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Magic DAW Icon</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: transparent; width: 1024px; height: 1024px; overflow: hidden; }
</style>
</head>
<body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background aurora radial -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="60%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>

    <!-- Aurora sweep -->
    <linearGradient id="aurora-sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="30%" stop-color="#67e8f9"/>
      <stop offset="60%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>

    <!-- Waveform gradient -->
    <linearGradient id="wave-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3"/>
      <stop offset="25%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="75%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>

    <!-- M letter gradient -->
    <linearGradient id="m-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Frosted glass -->
    <radialGradient id="frost" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>

    <filter id="sparkle-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circle-clip">
      <circle cx="512" cy="512" r="480"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#bg-glow)"/>

  <!-- Aurora atmosphere -->
  <ellipse cx="512" cy="452" rx="350" ry="200" fill="url(#aurora-sweep)" opacity="0.12" filter="url(#soft-glow)" clip-path="url(#circle-clip)"/>
  <ellipse cx="592" cy="612" rx="280" ry="160" fill="#a78bfa" opacity="0.08" filter="url(#soft-glow)" clip-path="url(#circle-clip)"/>

  <!-- Constellation lines -->
  <g clip-path="url(#circle-clip)" opacity="0.25">
    <line x1="280" y1="220" x2="680" y2="180" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <line x1="680" y1="180" x2="450" y2="160" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <line x1="450" y1="160" x2="510" y2="280" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <line x1="740" y1="260" x2="820" y2="540" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <line x1="200" y1="480" x2="160" y2="350" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
    <line x1="600" y1="830" x2="860" y2="680" stroke="#67e8f9" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Sparkle stars -->
  <g clip-path="url(#circle-clip)">
    <g filter="url(#sparkle-glow)">
      <circle cx="280" cy="220" r="3.5" fill="white" opacity="0.9"/>
      <line x1="269.5" y1="220" x2="290.5" y2="220" stroke="white" stroke-width="0.6" opacity="0.45"/>
      <line x1="280" y1="209.5" x2="280" y2="230.5" stroke="white" stroke-width="0.6" opacity="0.45"/>
    </g>
    <g filter="url(#sparkle-glow)">
      <circle cx="740" cy="260" r="2.5" fill="white" opacity="0.7"/>
      <line x1="732.5" y1="260" x2="747.5" y2="260" stroke="white" stroke-width="0.6" opacity="0.35"/>
      <line x1="740" y1="252.5" x2="740" y2="267.5" stroke="white" stroke-width="0.6" opacity="0.35"/>
    </g>
    <circle cx="350" cy="720" r="2.0" fill="white" opacity="0.6" filter="url(#sparkle-glow)"/>
    <g filter="url(#sparkle-glow)">
      <circle cx="680" cy="180" r="3.0" fill="white" opacity="0.8"/>
      <line x1="671" y1="180" x2="689" y2="180" stroke="white" stroke-width="0.6" opacity="0.4"/>
      <line x1="680" y1="171" x2="680" y2="189" stroke="white" stroke-width="0.6" opacity="0.4"/>
    </g>
    <g filter="url(#sparkle-glow)">
      <circle cx="200" cy="480" r="2.5" fill="white" opacity="0.5"/>
      <line x1="192.5" y1="480" x2="207.5" y2="480" stroke="white" stroke-width="0.6" opacity="0.25"/>
      <line x1="200" y1="472.5" x2="200" y2="487.5" stroke="white" stroke-width="0.6" opacity="0.25"/>
    </g>
    <circle cx="820" cy="540" r="2.0" fill="white" opacity="0.7" filter="url(#sparkle-glow)"/>
    <circle cx="450" cy="160" r="1.5" fill="white" opacity="0.6" filter="url(#sparkle-glow)"/>
    <g filter="url(#sparkle-glow)">
      <circle cx="600" cy="830" r="2.5" fill="white" opacity="0.65"/>
      <line x1="592.5" y1="830" x2="607.5" y2="830" stroke="white" stroke-width="0.6" opacity="0.325"/>
      <line x1="600" y1="822.5" x2="600" y2="837.5" stroke="white" stroke-width="0.6" opacity="0.325"/>
    </g>
    <circle cx="160" cy="350" r="1.8" fill="white" opacity="0.55" filter="url(#sparkle-glow)"/>
    <g filter="url(#sparkle-glow)">
      <circle cx="860" cy="680" r="2.2" fill="white" opacity="0.6"/>
      <line x1="853.4" y1="680" x2="866.6" y2="680" stroke="white" stroke-width="0.6" opacity="0.3"/>
      <line x1="860" y1="673.4" x2="860" y2="686.6" stroke="white" stroke-width="0.6" opacity="0.3"/>
    </g>
    <circle cx="510" cy="280" r="1.5" fill="white" opacity="0.5" filter="url(#sparkle-glow)"/>
    <circle cx="390" cy="580" r="1.2" fill="white" opacity="0.45" filter="url(#sparkle-glow)"/>
  </g>

  <!-- Waveform lines (5 lines, pre-computed) -->
  <g clip-path="url(#circle-clip)">
    <!-- Wave 0 (offset -56, phase 0) -->
    <path d="M 252 456 C 282 430 332 395 382 410 C 432 425 462 470 512 456 C 562 442 592 385 642 395 C 692 405 722 445 772 456" fill="none" stroke="url(#wave-grad)" stroke-width="2.4" stroke-linecap="round" opacity="0.64" filter="url(#glow)"/>
    <!-- Wave 1 (offset -28, phase 0.8) -->
    <path d="M 252 484 C 292 450 342 420 392 445 C 442 470 472 510 512 484 C 552 458 582 405 632 420 C 682 435 732 475 772 484" fill="none" stroke="url(#wave-grad)" stroke-width="2.7" stroke-linecap="round" opacity="0.82" filter="url(#glow)"/>
    <!-- Wave 2 (center, phase 1.6) — boldest -->
    <path d="M 252 512 C 302 465 352 435 402 475 C 452 515 482 555 512 512 C 542 469 572 415 622 445 C 672 475 722 510 772 512" fill="none" stroke="url(#wave-grad)" stroke-width="3.0" stroke-linecap="round" opacity="1.0" filter="url(#glow)"/>
    <!-- Wave 3 (offset +28, phase 2.4) -->
    <path d="M 252 540 C 302 510 352 485 402 510 C 452 535 482 570 512 540 C 542 510 582 470 632 490 C 682 510 732 535 772 540" fill="none" stroke="url(#wave-grad)" stroke-width="2.7" stroke-linecap="round" opacity="0.82" filter="url(#glow)"/>
    <!-- Wave 4 (offset +56, phase 3.2) -->
    <path d="M 252 568 C 302 545 352 530 402 545 C 452 560 482 585 512 568 C 542 551 582 525 632 535 C 682 545 732 560 772 568" fill="none" stroke="url(#wave-grad)" stroke-width="2.4" stroke-linecap="round" opacity="0.64" filter="url(#glow)"/>
  </g>

  <!-- Stylised "M" mark — wide and proportional, sitting behind waveform -->
  <path d="M 362 600 L 412 340 L 512 520 L 612 340 L 662 600" fill="none" stroke="url(#m-grad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" filter="url(#glow)"/>

  <!-- Frosted glass inner ring -->
  <circle cx="512" cy="512" r="420" fill="url(#frost)" clip-path="url(#circle-clip)"/>

  <!-- Neon edge ring -->
  <circle cx="512" cy="512" r="478" fill="none" stroke="url(#aurora-sweep)" stroke-width="2.5" opacity="0.7"/>

  <!-- Outer glow ring -->
  <circle cx="512" cy="512" r="478" fill="none" stroke="url(#aurora-sweep)" stroke-width="8" opacity="0.15" filter="url(#soft-glow)"/>

  <!-- Inner subtle ring -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
</svg>
</body>
</html>
